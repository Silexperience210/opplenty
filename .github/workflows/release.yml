name: build & release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # required for the release; uses the auto GITHUB_TOKEN

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build + test deps
        run: |
          python -m pip install --upgrade pip build
          pip install -r requirements.txt

      - name: Run test suite
        run: python tests.py

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        # GITHUB_TOKEN is injected automatically — no PAT, no secret to paste.
